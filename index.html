<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đội Hình Tiêu Biểu</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f3d0f;
    font-family: 'Be Vietnam Pro', sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px 12px;
    min-height: 100vh;
  }

  /* ── Outer layout: sân + dự bị ── */
  .page-wrap {
    width: 100%;
    max-width: 860px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  /* ── Phần sân (trái) ── */
  .main-col { flex: 1; min-width: 0; }

  .title-bar { text-align: center; margin-bottom: 14px; }
  .title-bar h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 26px; color: #FFD700;
    letter-spacing: 2px; font-weight: 700; line-height: 1;
  }
  .meta {
    color: rgba(255,255,255,0.5); font-size: 10px;
    margin-top: 4px; letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── Field ── */
  .field-outer {
    background: #1e7a1e;
    border-radius: 12px;
    padding: 14px 10px;
    border: 3px solid rgba(255,255,255,0.15);
    position: relative;
    min-height: 560px;
  }
  .field-lines { position: absolute; inset: 0; pointer-events: none; border-radius: 10px; overflow: hidden; }
  .field-lines::before {
    content: ''; position: absolute; top: 50%; left: 8%; right: 8%;
    height: 1px; background: rgba(255,255,255,0.18);
  }
  .field-lines::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 70px; height: 70px;
    border: 1.5px solid rgba(255,255,255,0.18); border-radius: 50%;
  }
  .field-outer::before {
    content: ''; position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 160px; height: 55px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-top: none; border-radius: 0 0 6px 6px;
  }
  .field-outer::after {
    content: ''; position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%);
    width: 160px; height: 55px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-bottom: none; border-radius: 6px 6px 0 0;
  }
  .goal-top { width: 56px; height: 12px; border: 2px solid rgba(255,255,255,0.35); border-top: none; border-radius: 0 0 4px 4px; margin: 0 auto 8px; }
  .goal-bot { width: 56px; height: 12px; border: 2px solid rgba(255,255,255,0.35); border-bottom: none; border-radius: 4px 4px 0 0; margin: 8px auto 0; }

  /* ── Hàng cầu thủ trên sân ── */
  .row {
    display: flex; justify-content: center;
    align-items: flex-start; gap: 6px;
    padding: 6px 0; position: relative; z-index: 1;
  }
  .player {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px; width: 82px; cursor: default;
  }
  .avatar-wrap { position: relative; }
  .avatar {
    width: 54px; height: 54px; border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.5);
    background: #145214;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
  }
  .player:hover .avatar { transform: scale(1.1); box-shadow: 0 4px 18px rgba(0,0,0,0.6); }
  .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
  .avatar .ini { font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.5px; display: none; }
  .avatar img.err { display: none; }
  .avatar img.err ~ .ini { display: flex; }
  .gk  .avatar { border-color: #FFD700; }
  .def .avatar { border-color: #5b9fe8; }
  .mid .avatar { border-color: #c97de8; }
  .fwd .avatar { border-color: #e87070; }
  .score-badge {
    position: absolute; bottom: -3px; right: -3px;
    background: #FFD700; color: #1a1a1a;
    font-size: 9px; font-weight: 700;
    border-radius: 8px; padding: 1px 5px;
    border: 1.5px solid rgba(0,0,0,0.15); white-space: nowrap;
  }
  .pname {
    color: #fff; font-size: 10px; font-weight: 700;
    text-align: center; line-height: 1.25;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  .ppos { color: rgba(255,255,255,0.55); font-size: 9px; text-align: center; }

  /* ── Legend ── */
  .legend { display: flex; justify-content: center; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.65); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ── Loading / Error ── */
  .state-msg {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: rgba(255,255,255,0.6); font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #FFD700; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Panel dự bị (phải) ── */
  .bench-panel {
    width: 138px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.28);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 8px;
    /* Căn top ngang với field: title-bar h1(26px) + line-height + meta(10px) + gap + margin-bottom(14px) ≈ 62px */
    margin-top: 62px;
  }
  .bench-title {
    font-family: 'Oswald', sans-serif;
    font-size: 12px; font-weight: 700; color: #FFD700;
    letter-spacing: 1px; text-align: center;
    margin-bottom: 10px; text-transform: uppercase;
  }
  .bench-list { display: flex; flex-direction: column; gap: 2px; }

  .bench-player {
    display: flex; align-items: center; gap: 7px;
    padding: 4px 5px; border-radius: 6px; cursor: default;
    transition: background 0.15s;
  }
  .bench-player:hover { background: rgba(255,255,255,0.08); }

  .bench-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.3);
    background: #145214;
    display: flex; align-items: center; justify-content: center;
  }
  .bench-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .bench-avatar .ini { font-size: 9px; font-weight: 700; color: #fff; display: none; }
  .bench-avatar img.err { display: none; }
  .bench-avatar img.err ~ .ini { display: flex; }
  .bench-gk  .bench-avatar { border-color: #FFD700; }
  .bench-def .bench-avatar { border-color: #5b9fe8; }
  .bench-mid .bench-avatar { border-color: #c97de8; }
  .bench-fwd .bench-avatar { border-color: #e87070; }

  .bench-info { min-width: 0; flex: 1; }
  .bench-name {
    color: #fff; font-size: 10px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.2;
  }
  .bench-sub {
    display: flex; align-items: center; gap: 4px; margin-top: 1px;
  }
  .bench-pos { color: rgba(255,255,255,0.45); font-size: 8.5px; }
  .bench-score { color: #FFD700; font-size: 8.5px; font-weight: 700; }

  .bench-sep {
    height: 1px; background: rgba(255,255,255,0.08);
    margin: 4px 2px;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed; background: rgba(10,30,10,0.95); color: #fff;
    font-size: 12px; padding: 8px 12px; border-radius: 7px;
    pointer-events: none; z-index: 999;
    border: 1px solid rgba(255,215,0,0.4);
    display: none; line-height: 1.6; max-width: 200px;
  }
  #tooltip.show { display: block; }
</style>
</head>
<body>

<!-- ⚠️ THAY URL BÊN DƯỚI bằng Web App URL sau khi deploy Apps Script -->
<script>
  const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnRjGPLYpAL7wXkE3dm0zdNw0WrOq--tNIZRLUjyls3-GIZynhjk-Jwo7iNy_trUcSn_0uMbhiT2gnp2J-3GdoJ9WMGljlPGefkzwhGoh0o2kwkaPxor6RRaqXnsRndcarDvfittUGZLm7JvkbLl4gkhSO72UV3ubfA9vp16vx8Sled1c8fjkFE7laaGPt1Bl4sBE-0xO2_7PEz2zAVz6Kc82tTku0q94v8TZOJrsVlHfxniLMvukBCyFqHbUezgIOOzCBzQcjyhLBCD03HTVbcOmW7cqg&lib=Mbf4awmFVdZhjC63qXjqcH3bIP5hoCzyG";
</script>

<div class="page-wrap">

  <!-- ── Cột sân ── -->
  <div class="main-col">
    <div class="title-bar">
      <h1>ĐỘI HÌNH TIÊU BIỂU</h1>
      <div class="meta" id="meta">Đang tải...</div>
    </div>

    <div class="field-outer" id="field">
      <div class="field-lines"></div>
      <div class="state-msg" id="loading">
        <div class="spinner"></div>
        <span>Đang tải dữ liệu...</span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#FFD700"></span>Thủ môn</div>
      <div class="legend-item"><span class="legend-dot" style="background:#5b9fe8"></span>Hậu vệ</div>
      <div class="legend-item"><span class="legend-dot" style="background:#c97de8"></span>Tiền vệ</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e87070"></span>Tiền đạo</div>
    </div>
  </div>

  <!-- ── Panel dự bị ── -->
  <div class="bench-panel" id="bench-panel" style="display:none">
    <div class="bench-title">🔄 Dự Bị</div>
    <div class="bench-list" id="bench-list"></div>
  </div>

</div>

<div id="tooltip"></div>

<script>
// ── Helpers ──
function ini(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 3);
}
function cls(viTri) {
  if (viTri === "Thủ môn")                              return "gk";
  if (viTri.includes("Hậu") || viTri.includes("Trung")) return "def";
  if (viTri.includes("Tiền vệ"))                        return "mid";
  if (viTri.includes("Tiền đạo"))                       return "fwd";
  return "mid";
}
function lbl(viTri) {
  return ({
    "Thủ môn":      "Thủ Môn",
    "Trung vệ":     "Trung Vệ",
    "Hậu vệ cánh":  "HV Cánh",
    "Tiền vệ TT":   "TV Trung Tâm",
    "Tiền vệ cánh": "TV Cánh",
    "Tiền đạo":     "Tiền Đạo"
  })[viTri] || viTri;
}
function avatarImg(p, size) {
  return p.avatar
    ? `<img src="${p.avatar}" alt="${p.ten}" onerror="this.classList.add('err')">`
    : '';
}

const tip = document.getElementById('tooltip');
function bindTip(el, p) {
  el.addEventListener('mouseenter', () => {
    tip.innerHTML = `
      <strong style="color:#FFD700">${p.ten}</strong><br>
      ${p.stt} · ${p.viTri}<br>
      <span style="color:#adf5ad">⚡ Chuyên cần: <strong>${p.chuyenCan}đ</strong></span><br>
      <span style="color:#a8d8ff">🎯 Chuyên môn: <strong>${p.chuyenMon}đ</strong></span><br>
      <span style="color:#ffd0a8">⚽ Thi đấu: <strong>${p.hoatDong}đ</strong></span><br>
      Tổng điểm: <strong style="color:#FFD700">${p.diem}đ</strong>`;
    tip.classList.add('show');
  });
  el.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 40) + 'px';
  });
  el.addEventListener('mouseleave', () => tip.classList.remove('show'));
}

// ── Tạo card cầu thủ trên sân ──
function makePlayer(p) {
  const div = document.createElement('div');
  div.className = `player ${cls(p.viTri)}`;
  div.innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar">${avatarImg(p)}<span class="ini">${ini(p.ten)}</span></div>
      <span class="score-badge">${p.diem}đ</span>
    </div>
    <div class="pname">${p.ten}</div>
    <div class="ppos">${lbl(p.viTri)}</div>`;
  bindTip(div, p);
  return div;
}

function makeRow(players) {
  const row = document.createElement('div');
  row.className = 'row';
  players.filter(Boolean).forEach(p => row.appendChild(makePlayer(p)));
  return row;
}

// ── Render sân chính ──
function renderField(data) {
  const field = document.getElementById('field');
  field.innerHTML = '<div class="field-lines"></div>';
  const s = data.squad;

  field.appendChild(Object.assign(document.createElement('div'), { className: 'goal-top' }));

  // Tiền đạo
  if (s["Tiền đạo"]?.length)
    field.appendChild(makeRow(s["Tiền đạo"]));

  // Tiền vệ: cánh T | TT x2 | cánh P
  const midRow = [
    s["Tiền vệ cánh"]?.[0],
    ...(s["Tiền vệ TT"]?.slice(0, 2) || []),
    s["Tiền vệ cánh"]?.[1]
  ].filter(Boolean);
  if (midRow.length) field.appendChild(makeRow(midRow));

  // Tiền vệ TT thứ 3
  if (s["Tiền vệ TT"]?.length >= 3)
    field.appendChild(makeRow([s["Tiền vệ TT"][2]]));

  // Hậu vệ: cánh T | Trung vệ x2 | cánh P
  const defRow = [
    s["Hậu vệ cánh"]?.[0],
    ...(s["Trung vệ"] || []),
    s["Hậu vệ cánh"]?.[1]
  ].filter(Boolean);
  if (defRow.length) field.appendChild(makeRow(defRow));

  // Thủ môn
  if (s["Thủ môn"]?.length)
    field.appendChild(makeRow(s["Thủ môn"]));

  field.appendChild(Object.assign(document.createElement('div'), { className: 'goal-bot' }));

  document.getElementById('meta').textContent =
    `Sơ đồ ${data.formation} · Cập nhật: ${data.updatedAt}`;
}

// ── Render panel dự bị ──
function renderBench(data) {
  const b = data.bench;
  if (!b) return;

  // Thứ tự hiển thị trong panel
  const ORDER = [
    "Thủ môn",
    "Hậu vệ cánh",
    "Trung vệ",
    "Tiền vệ TT",
    "Tiền vệ cánh",
    "Tiền đạo"
  ];

  const list = document.getElementById('bench-list');
  list.innerHTML = '';
  let first = true;

  ORDER.forEach(pos => {
    const players = b[pos];
    if (!players || players.length === 0) return;

    // Dòng phân cách giữa các nhóm vị trí
    if (!first) {
      const sep = document.createElement('div');
      sep.className = 'bench-sep';
      list.appendChild(sep);
    }
    first = false;

    players.forEach(p => {
      const posClass = cls(p.viTri);
      const div = document.createElement('div');
      div.className = `bench-player bench-${posClass}`;
      div.innerHTML = `
        <div class="bench-avatar">
          ${avatarImg(p)}
          <span class="ini">${ini(p.ten)}</span>
        </div>
        <div class="bench-info">
          <div class="bench-name">${p.ten}</div>
          <div class="bench-sub">
            <span class="bench-pos">${lbl(p.viTri)}</span>
            <span class="bench-score">${p.diem}đ</span>
          </div>
        </div>`;
      bindTip(div, p);
      list.appendChild(div);
    });
  });

  document.getElementById('bench-panel').style.display = 'block';
}

// ── Căn bench panel top ngang với field ──
function alignBench() {
  const field = document.getElementById('field');
  const bench = document.getElementById('bench-panel');
  const wrap  = document.querySelector('.page-wrap');
  if (!field || !bench || !wrap) return;
  const offset = field.getBoundingClientRect().top - wrap.getBoundingClientRect().top;
  bench.style.marginTop = Math.max(0, offset) + 'px';
}

// ── Fetch dữ liệu từ Apps Script ──
fetch(API_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    renderField(data);
    renderBench(data);
    // Đợi font load xong rồi mới đo để chính xác
    document.fonts.ready.then(() => {
      alignBench();
      // Gọi thêm lần nữa sau 200ms phòng trường hợp layout chưa ổn định
      setTimeout(alignBench, 200);
    });
  })
  .catch(err => {
    document.getElementById('field').innerHTML = `
      <div class="state-msg">
        <span style="font-size:24px">⚠️</span>
        <span>Không tải được dữ liệu</span>
        <span style="font-size:10px;opacity:0.5">${err.message}</span>
      </div>`;
    document.getElementById('meta').textContent = 'Lỗi kết nối';
  });
window.addEventListener('resize', alignBench);

</script>
</body>
</html>
