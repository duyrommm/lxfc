<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đội Hình Tiêu Biểu</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f3d0f;
    font-family: 'Be Vietnam Pro', sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px 12px;
    min-height: 100vh;
  }

  /* ── Layout wrapper ── */
  .page-wrap {
    width: 100%;
    max-width: 820px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .container { flex: 1; min-width: 0; }

  /* ── Bench panel ── */
  .bench-panel {
    width: 130px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.25);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 8px;
    margin-top: 48px; /* align với field */
  }
  .bench-title {
    font-family: 'Oswald', sans-serif;
    font-size: 13px; font-weight: 600;
    color: #FFD700; letter-spacing: 1px;
    text-align: center; margin-bottom: 10px;
    text-transform: uppercase;
  }
  .bench-list { display: flex; flex-direction: column; gap: 6px; }

  /* Bench player row (horizontal: avatar + text) */
  .bench-player {
    display: flex; align-items: center; gap: 7px;
    cursor: default; padding: 3px 4px; border-radius: 6px;
    transition: background 0.15s;
  }
  .bench-player:hover { background: rgba(255,255,255,0.08); }

  .bench-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.35);
    background: #145214;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .bench-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .bench-avatar img.error { display: none; }
  .bench-avatar img.error ~ .ini { display: flex; }
  .bench-avatar .ini { font-size: 9px; font-weight: 700; color: #fff; display: none; }

  .bench-gk  .bench-avatar { border-color: #FFD700; }
  .bench-def .bench-avatar { border-color: #5b9fe8; }
  .bench-mid .bench-avatar { border-color: #c97de8; }
  .bench-fwd .bench-avatar { border-color: #e87070; }

  .bench-info { min-width: 0; }
  .bench-name {
    color: #fff; font-size: 10px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.2;
  }
  .bench-pos { color: rgba(255,255,255,0.5); font-size: 9px; }
  .bench-score { color: #FFD700; font-size: 9px; font-weight: 700; }

  .bench-divider {
    height: 1px; background: rgba(255,255,255,0.1);
    margin: 4px 0;
  }

  .title-bar { text-align: center; margin-bottom: 14px; }
  .title-bar h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 26px; color: #FFD700;
    letter-spacing: 2px; font-weight: 700; line-height: 1;
  }
  .meta { color: rgba(255,255,255,0.5); font-size: 10px; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  /* ── Field ── */
  .field-outer {
    background: #1e7a1e;
    border-radius: 12px;
    padding: 14px 10px;
    border: 3px solid rgba(255,255,255,0.15);
    position: relative;
    min-height: 560px;
  }

  /* Field markings */
  .field-lines { position: absolute; inset: 0; pointer-events: none; border-radius: 10px; overflow: hidden; }
  .field-lines::before {
    content: ''; position: absolute; top: 50%; left: 8%; right: 8%;
    height: 1px; background: rgba(255,255,255,0.18);
  }
  .field-lines::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 70px; height: 70px;
    border: 1.5px solid rgba(255,255,255,0.18); border-radius: 50%;
  }
  /* Penalty boxes */
  .field-outer::before {
    content: ''; position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 160px; height: 55px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-top: none; border-radius: 0 0 6px 6px;
  }
  .field-outer::after {
    content: ''; position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%);
    width: 160px; height: 55px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-bottom: none; border-radius: 6px 6px 0 0;
  }

  .goal-top  { width: 56px; height: 12px; border: 2px solid rgba(255,255,255,0.35); border-top: none; border-radius: 0 0 4px 4px; margin: 0 auto 8px; }
  .goal-bot  { width: 56px; height: 12px; border: 2px solid rgba(255,255,255,0.35); border-bottom: none; border-radius: 4px 4px 0 0; margin: 8px auto 0; }

  /* ── Player card ── */
  .row {
    display: flex; justify-content: center;
    align-items: flex-start; gap: 6px;
    padding: 6px 0; position: relative; z-index: 1;
  }

  .player {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px; width: 82px;
    cursor: default;
  }

  .avatar-wrap { position: relative; }

  .avatar {
    width: 54px; height: 54px; border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.5);
    background: #145214;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .player:hover .avatar {
    transform: scale(1.1);
    box-shadow: 0 4px 18px rgba(0,0,0,0.6);
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top center;
    display: block;
  }
  /* Fallback initials khi ảnh lỗi */
  .avatar .ini {
    font-size: 11px; font-weight: 700; color: #fff;
    letter-spacing: 0.5px; display: none;
  }
  .avatar img.error { display: none; }
  .avatar img.error ~ .ini { display: flex; }

  /* Border màu theo vị trí */
  .gk  .avatar { border-color: #FFD700; }
  .def .avatar { border-color: #5b9fe8; }
  .mid .avatar { border-color: #c97de8; }
  .fwd .avatar { border-color: #e87070; }

  .score-badge {
    position: absolute; bottom: -3px; right: -3px;
    background: #FFD700; color: #1a1a1a;
    font-size: 9px; font-weight: 700;
    border-radius: 8px; padding: 1px 5px;
    border: 1.5px solid rgba(0,0,0,0.15); white-space: nowrap;
  }

  .pname {
    color: #fff; font-size: 10px; font-weight: 700;
    text-align: center; line-height: 1.25;
    font-family: 'Be Vietnam Pro', sans-serif;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  .ppos { color: rgba(255,255,255,0.55); font-size: 9px; text-align: center; font-family: 'Be Vietnam Pro', sans-serif; }

  /* ── Legend ── */
  .legend { display: flex; justify-content: center; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.65); }
  .legend-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ── Loading/Error ── */
  .state-msg {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: rgba(255,255,255,0.6); font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #FFD700; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed; background: rgba(10,30,10,0.95); color: #fff;
    font-size: 12px; padding: 8px 12px; border-radius: 7px;
    pointer-events: none; z-index: 999;
    border: 1px solid rgba(255,215,0,0.4);
    display: none; line-height: 1.6; max-width: 200px;
  }
  #tooltip.show { display: block; }
</style>
</head>
<body>

<!-- ⚠️ THAY URL BÊN DƯỚI bằng Web App URL sau khi deploy Apps Script -->
<script>
  const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnT9ljXX17Psl7Iuvc3QA9KbV73EdUh8OPUQ5B4R-n2VXXHMed6rb6UP6Igi9uZHkgqpXDc6XgbED9UblFN4z3NMPDq2TFtqg1niPcwts2i3wM1trehbiOcrbL43xSWJRTDtFK0a2dk_Gkxk49hb0swr6tBzwxzVQ7V3AFGpdMqHt3jKjstJ_UwrSALfe-0J425wA1e6QTl0se1XEbV1q1M_NMxc5ci1w2_E7FD7GjGMf29UdvKiNrQtHMybGZuxM6CdBXImNz6mt8Fx9zfxQGOoPGRllw&lib=Mbf4awmFVdZhjC63qXjqcH3bIP5hoCzyG";
</script>

<div class="page-wrap">
<div class="container">
  <div class="title-bar">
    <h1>ĐỘI HÌNH TIÊU BIỂU</h1>
    <div class="meta" id="meta">Đang tải...</div>
  </div>

  <div class="field-outer" id="field">
    <div class="field-lines"></div>
    <div class="state-msg" id="loading">
      <div class="spinner"></div>
      <span>Đang tải dữ liệu...</span>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#FFD700"></span>Thủ môn</div>
    <div class="legend-item"><span class="legend-dot" style="background:#5b9fe8"></span>Hậu vệ</div>
    <div class="legend-item"><span class="legend-dot" style="background:#c97de8"></span>Tiền vệ</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e87070"></span>Tiền đạo</div>
  </div>
</div>

<!-- Bench panel -->
<div class="bench-panel" id="bench-panel" style="display:none">
  <div class="bench-title">🔄 Dự Bị</div>
  <div class="bench-list" id="bench-list"></div>
</div>

</div>

<div id="tooltip"></div>

<script>
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 3);
}
function posClass(viTri) {
  if (viTri === "Thủ môn")          return "gk";
  if (viTri.includes("Hậu") || viTri.includes("Trung")) return "def";
  if (viTri.includes("Tiền vệ"))    return "mid";
  if (viTri.includes("Tiền đạo"))   return "fwd";
  return "mid";
}
function posLabel(viTri) {
  return { "Thủ môn":"Thủ Môn","Trung vệ":"Trung Vệ","Hậu vệ cánh":"HV Cánh",
           "Tiền vệ TT":"TV Trung Tâm","Tiền vệ cánh":"TV Cánh","Tiền đạo":"Tiền Đạo" }[viTri] || viTri;
}

const tip = document.getElementById('tooltip');

function makePlayer(p) {
  const cls = posClass(p.viTri);
  const ini = initials(p.ten);
  const div = document.createElement('div');
  div.className = `player ${cls}`;

  // Avatar: dùng ảnh thật nếu có, fallback về initials
  const avatarHTML = p.avatar
    ? `<img src="${p.avatar}" alt="${p.ten}" onerror="this.classList.add('error')">`
    : '';

  div.innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar">
        ${avatarHTML}
        <span class="ini">${ini}</span>
      </div>
      <span class="score-badge">${p.diem}đ</span>
    </div>
    <div class="pname">${p.ten}</div>
    <div class="ppos">${posLabel(p.viTri)}</div>`;

  div.addEventListener('mouseenter', e => {
    tip.innerHTML = `<strong style="color:#FFD700">${p.ten}</strong><br>${p.stt} · ${p.viTri}<br>Tổng điểm: <strong>${p.diem}đ</strong>`;
    tip.classList.add('show');
  });
  div.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 40) + 'px';
  });
  div.addEventListener('mouseleave', () => tip.classList.remove('show'));
  return div;
}

function makeRow(players) {
  const row = document.createElement('div');
  row.className = 'row';
  players.filter(Boolean).forEach(p => row.appendChild(makePlayer(p)));
  return row;
}

function renderField(data) {
  const field = document.getElementById('field');
  field.innerHTML = '<div class="field-lines"></div>';
  const s = data.squad;

  field.appendChild(Object.assign(document.createElement('div'), { className: 'goal-top' }));

  // FWD
  if (s["Tiền đạo"]?.length)
    field.appendChild(makeRow(s["Tiền đạo"]));

  // MID: cánh T | TT x2 | cánh P
  const midRow = [
    s["Tiền vệ cánh"]?.[0],
    ...(s["Tiền vệ TT"]?.slice(0,2) || []),
    s["Tiền vệ cánh"]?.[1]
  ].filter(Boolean);
  if (midRow.length) field.appendChild(makeRow(midRow));

  // 3rd TV TT
  if (s["Tiền vệ TT"]?.length >= 3)
    field.appendChild(makeRow([s["Tiền vệ TT"][2]]));

  // DEF: HV cánh T | Trung vệ x2 | HV cánh P
  const defRow = [
    s["Hậu vệ cánh"]?.[0],
    ...(s["Trung vệ"] || []),
    s["Hậu vệ cánh"]?.[1]
  ].filter(Boolean);
  if (defRow.length) field.appendChild(makeRow(defRow));

  // GK
  if (s["Thủ môn"]?.length)
    field.appendChild(makeRow(s["Thủ môn"]));

  field.appendChild(Object.assign(document.createElement('div'), { className: 'goal-bot' }));

  document.getElementById('meta').textContent =
    `Sơ đồ ${data.formation} · Cập nhật: ${data.updatedAt}`;
}

// ── Fetch ──
fetch(API_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => renderField(data))
  .catch(err => {
    document.getElementById('field').innerHTML = `
      <div class="state-msg">
        <span style="font-size:24px">⚠️</span>
        <span>Không tải được dữ liệu</span>
        <span style="font-size:10px;opacity:0.5">${err.message}</span>
      </div>`;
    document.getElementById('meta').textContent = 'Lỗi kết nối';
  });
</script>
</body>
</html>
