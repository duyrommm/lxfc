<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đội Hình Tiêu Biểu</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f3d0f;
  font-family: 'Be Vietnam Pro', sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px 12px;
  min-height: 100vh;
}

/* ── Layout ── */
.page-wrap {
  width: 100%; max-width: 880px;
  display: flex; gap: 14px; align-items: flex-start;
}
.main-col { flex: 1; min-width: 0; }

/* ── Title ── */
.title-bar { text-align: center; margin-bottom: 14px; }
.title-bar h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 26px; color: #FFD700;
  letter-spacing: 2px; font-weight: 700; line-height: 1;
}
.meta { color: rgba(255,255,255,0.5); font-size: 10px; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

/* ── Field ── */
.field-outer {
  background: #1e7a1e; border-radius: 12px;
  padding: 14px 10px;
  border: 3px solid rgba(255,255,255,0.15);
  position: relative; min-height: 560px;
}
.field-lines { position: absolute; inset: 0; pointer-events: none; border-radius: 10px; overflow: hidden; }
.field-lines::before {
  content: ''; position: absolute; top: 50%; left: 8%; right: 8%;
  height: 1px; background: rgba(255,255,255,0.18);
}
.field-lines::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 70px; height: 70px;
  border: 1.5px solid rgba(255,255,255,0.18); border-radius: 50%;
}
.field-outer::before {
  content: ''; position: absolute; top: 14px; left: 50%;
  transform: translateX(-50%);
  width: 160px; height: 55px;
  border: 1.5px solid rgba(255,255,255,0.15);
  border-top: none; border-radius: 0 0 6px 6px;
}
.field-outer::after {
  content: ''; position: absolute; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  width: 160px; height: 55px;
  border: 1.5px solid rgba(255,255,255,0.15);
  border-bottom: none; border-radius: 6px 6px 0 0;
}
.goal-top { width: 56px; height: 12px; border: 2px solid rgba(255,255,255,0.35); border-top: none; border-radius: 0 0 4px 4px; margin: 0 auto 8px; }
.goal-bot { width: 56px; height: 12px; border: 2px solid rgba(255,255,255,0.35); border-bottom: none; border-radius: 4px 4px 0 0; margin: 8px auto 0; }

/* ── Player card ── */
.row {
  display: flex; justify-content: center;
  align-items: flex-start; gap: 6px;
  padding: 6px 0; position: relative; z-index: 1;
}
.player {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px; width: 82px; cursor: pointer;
}
.avatar-wrap { position: relative; }
.avatar {
  width: 54px; height: 54px; border-radius: 50%;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.5);
  background: #145214;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
}
.player:hover .avatar { transform: scale(1.1); box-shadow: 0 4px 18px rgba(0,0,0,0.6); }
.player.selected .avatar { box-shadow: 0 0 0 3px #FFD700, 0 4px 18px rgba(255,215,0,0.5); transform: scale(1.08); }
.avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
.avatar .ini { font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.5px; display: none; }
.avatar img.err { display: none; }
.avatar img.err ~ .ini { display: flex; }
.gk  .avatar { border-color: #FFD700; }
.def .avatar { border-color: #5b9fe8; }
.mid .avatar { border-color: #c97de8; }
.fwd .avatar { border-color: #e87070; }
.score-badge {
  position: absolute; bottom: -3px; right: -3px;
  background: #FFD700; color: #1a1a1a;
  font-size: 9px; font-weight: 700;
  border-radius: 8px; padding: 1px 5px;
  border: 1.5px solid rgba(0,0,0,0.15); white-space: nowrap;
}
.pname { color: #fff; font-size: 10px; font-weight: 700; text-align: center; line-height: 1.25; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
.ppos { color: rgba(255,255,255,0.55); font-size: 9px; text-align: center; }

/* ── Legend ── */
.legend { display: flex; justify-content: center; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.65); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* ── Loading / Error ── */
.state-msg {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: rgba(255,255,255,0.6); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #FFD700; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Bench panel ── */
.bench-panel {
  width: 138px; flex-shrink: 0;
  background: rgba(0,0,0,0.28);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 10px 8px;
}
.bench-title {
  font-family: 'Oswald', sans-serif;
  font-size: 12px; font-weight: 700; color: #FFD700;
  letter-spacing: 1px; text-align: center;
  margin-bottom: 10px; text-transform: uppercase;
}
.bench-list { display: flex; flex-direction: column; gap: 2px; }
.bench-player {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 5px; border-radius: 6px; cursor: pointer;
  transition: background 0.15s;
}
.bench-player:hover { background: rgba(255,255,255,0.08); }
.bench-player.selected { background: rgba(255,215,0,0.12); }
.bench-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.3);
  background: #145214;
  display: flex; align-items: center; justify-content: center;
}
.bench-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
.bench-avatar .ini { font-size: 9px; font-weight: 700; color: #fff; display: none; }
.bench-avatar img.err { display: none; }
.bench-avatar img.err ~ .ini { display: flex; }
.bench-gk  .bench-avatar { border-color: #FFD700; }
.bench-def .bench-avatar { border-color: #5b9fe8; }
.bench-mid .bench-avatar { border-color: #c97de8; }
.bench-fwd .bench-avatar { border-color: #e87070; }
.bench-info { min-width: 0; flex: 1; }
.bench-name { color: #fff; font-size: 10px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
.bench-sub { display: flex; align-items: center; gap: 4px; margin-top: 1px; }
.bench-pos { color: rgba(255,255,255,0.45); font-size: 8.5px; }
.bench-score { color: #FFD700; font-size: 8.5px; font-weight: 700; }
.bench-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 2px; }

/* ════════════════════════════════
   MODAL STATS
   ════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }

.modal {
  background: #0d2e0d;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  width: 360px; max-width: 95vw;
  overflow: hidden;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.22s;
  position: relative;
}
.modal-overlay.show .modal { transform: translateY(0) scale(1); }

.modal-header {
  background: linear-gradient(135deg, #1a5c1a 0%, #0d3d0d 100%);
  padding: 18px 20px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  position: relative;
}
.modal-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  border: 3px solid #FFD700;
  background: #145214;
  display: flex; align-items: center; justify-content: center;
}
.modal-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
.modal-avatar .ini { font-size: 18px; font-weight: 700; color: #fff; }
.modal-avatar img.err { display: none; }
.modal-avatar img.err ~ .ini { display: flex; }

.modal-info { flex: 1; min-width: 0; }
.modal-name { font-family: 'Oswald', sans-serif; font-size: 20px; color: #FFD700; font-weight: 700; line-height: 1.1; }
.modal-pos  { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 3px; }
.modal-so-ao {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3);
  color: #FFD700; font-size: 11px; font-weight: 700;
  padding: 2px 9px; border-radius: 10px; margin-top: 5px;
}

/* Số áo badge — góc trên phải avatar, không đè header */
.modal-id-badge {
  position: absolute; top: 10px; right: 46px;
  background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.55);
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Close btn */
.modal-close {
  position: absolute; top: 12px; right: 14px;
  background: rgba(255,255,255,0.1); border: none;
  color: #fff; width: 28px; height: 28px; border-radius: 50%;
  font-size: 16px; cursor: pointer; line-height: 28px; text-align: center;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.2); }

/* Score summary */
.modal-scores {
  display: flex; gap: 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.score-block {
  flex: 1; padding: 12px 6px; text-align: center;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.score-block:last-child { border-right: none; }
.score-val { font-family: 'Oswald', sans-serif; font-size: 22px; color: #FFD700; font-weight: 700; line-height: 1; }
.score-label { color: rgba(255,255,255,0.45); font-size: 9px; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Stat bars */
.modal-bars { padding: 14px 18px; }
.bar-row { margin-bottom: 10px; }
.bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.bar-label { color: rgba(255,255,255,0.7); font-size: 11px; }
.bar-val { color: #fff; font-size: 11px; font-weight: 700; }
.bar-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

/* Stats grid */
.modal-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 1px; background: rgba(255,255,255,0.06);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.stat-cell {
  background: #0d2e0d;
  padding: 10px 6px; text-align: center;
}
.stat-val { font-family: 'Oswald', sans-serif; font-size: 18px; color: #fff; font-weight: 600; line-height: 1; }
.stat-val.highlight { color: #FFD700; }
.stat-lbl { color: rgba(255,255,255,0.4); font-size: 8.5px; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.3px; }

/* Bench badge in modal */
.bench-badge {
  display: inline-block; background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5); font-size: 10px;
  padding: 2px 8px; border-radius: 8px; margin-top: 4px;
}
.starter-badge {
  display: inline-block; background: rgba(255,215,0,0.15);
  color: #FFD700; font-size: 10px;
  padding: 2px 8px; border-radius: 8px; margin-top: 4px;
  border: 1px solid rgba(255,215,0,0.3);
}
/* ── Tooltip ── */
#tooltip {
  position: fixed;
  background: rgba(10,30,10,0.95); color: #fff;
  font-size: 12px; padding: 9px 13px; border-radius: 8px;
  pointer-events: none; z-index: 500;
  border: 1px solid rgba(255,215,0,0.35);
  display: none; line-height: 1.7; max-width: 200px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
#tooltip.show { display: block; }
</style>

<div class="page-wrap">

  <!-- ── Sân chính ── -->
  <div class="main-col">
    <div class="title-bar">
      <h1>ĐỘI HÌNH TIÊU BIỂU</h1>
      <div class="meta" id="meta">Đang tải...</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-id-badge" id="modal-id"></div>

    <div class="modal-header">
      <div class="modal-avatar" id="modal-avatar">
        <span class="ini" id="modal-ini"></span>
      </div>
      <div class="modal-info">
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-pos"  id="modal-pos"></div>
        <div class="modal-so-ao" id="modal-so-ao"></div>
        <div id="modal-role-badge" style="margin-top:5px"></div>
      </div>
      <div class="modal-id-badge" id="modal-id"></div>
    </div>

    <!-- Tổng điểm breakdown -->
    <div class="modal-scores">

<script>
// ── Helpers ──
function ini(name) { return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,3); }
function cls(v) {
  if (v==="Thủ môn") return "gk";
  if (v.includes("Hậu")||v.includes("Trung")) return "def";
  if (v.includes("Tiền vệ")) return "mid";
  if (v.includes("Tiền đạo")) return "fwd";
  return "mid";
}
function lbl(v) {
  return ({"Thủ môn":"Thủ Môn","Trung vệ":"Trung Vệ","Hậu vệ cánh":"HV Cánh",
           "Tiền vệ TT":"TV Trung Tâm","Tiền vệ cánh":"TV Cánh","Tiền đạo":"Tiền Đạo"})[v]||v;
}

// ── Tooltip ──
const tip = document.getElementById('tooltip');
function showTip(e, p) {
  tip.innerHTML = `
    <strong style="color:#FFD700">${p.ten}</strong><br>
    ${p.stt} · ${p.viTri}<br>
    <span style="color:#adf5ad">⚡ Chuyên cần: <strong>${p.chuyenCan}đ</strong></span><br>
    <span style="color:#a8d8ff">🎯 Chuyên môn: <strong>${p.chuyenMon}đ</strong></span><br>
    <span style="color:#ffd0a8">⚽ Thi đấu: <strong>${p.hoatDong}đ</strong></span><br>
    Tổng điểm: <strong style="color:#FFD700">${p.diem}đ</strong>`;
  tip.classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 50) + 'px';
}
function hideTip() { tip.classList.remove('show'); }

// Track selected element
let selectedEl = null;

// ── Open modal ──
function openModal(p, isStarter) {
  // Deselect previous
  if (selectedEl) selectedEl.classList.remove('selected');

  // Modal fields
  document.getElementById('modal-id').textContent    = p.stt;
  document.getElementById('modal-name').textContent  = p.ten;
  document.getElementById('modal-pos').textContent   = p.viTri;
  document.getElementById('modal-so-ao').textContent = p.soAo ? '#' + p.soAo : '';
  document.getElementById('modal-ini').textContent   = ini(p.ten);
  document.getElementById('ms-cc').textContent    = p.chuyenCan  ?? '-';
  document.getElementById('ms-cm').textContent    = p.chuyenMon  ?? '-';
  document.getElementById('ms-hd').textContent    = p.hoatDong   ?? '-';
  document.getElementById('ms-total').textContent = p.diem       ?? '-';

  // Role badge
  const badge = document.getElementById('modal-role-badge');
  badge.innerHTML = isStarter
    ? '<span class="starter-badge">⚡ Đội hình chính</span>'
    : '<span class="bench-badge">🔄 Dự bị</span>';

  // Avatar
  const av = document.getElementById('modal-avatar');
  // Remove existing img if any
  const oldImg = av.querySelector('img');
  if (oldImg) oldImg.remove();
  if (p.avatar) {
    const img = document.createElement('img');
    img.src = p.avatar;
    img.onerror = function(){ this.classList.add('err'); };
    av.prepend(img);
  }

  // Bar charts
  const maxPts = 60; // estimated max for scale
  const bars = [
    { label: '⚡ Điểm Chuyên Cần', val: p.chuyenCan||0, max: 30, color: '#4caf50' },
    { label: '🎯 Điểm Chuyên Môn', val: p.chuyenMon||0, max: 30, color: '#2196f3' },
    { label: '⚽ Điểm Thi Đấu',    val: p.hoatDong||0,  max: 30, color: '#ff9800' },
  ];
  const barsEl = document.getElementById('modal-bars');
  barsEl.innerHTML = bars.map(b => {
    const pct = Math.min(100, Math.round((b.val / b.max) * 100));
    return `<div class="bar-row">
      <div class="bar-header">
        <span class="bar-label">${b.label}</span>
        <span class="bar-val">${b.val}đ</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${b.color}"></div>
      </div>
    </div>`;
  }).join('');

  // Stat grid — dùng dữ liệu từ CAU_THU được trả trong API
  const stats = [
    { lbl: 'Số Trận',  val: p.tran,       hi: false },
    { lbl: 'MVP',      val: p.mvp,        hi: p.mvp > 0 },
    { lbl: 'Bàn Thắng',val: p.gf,        hi: p.gf > 0 },
    { lbl: 'Pen Thắng',val: p.gp,        hi: false },
    { lbl: 'Kiến Tạo', val: p.ast,       hi: p.ast > 0 },
    { lbl: 'Thẻ Vàng', val: p.yc,        hi: false },
    { lbl: 'Thẻ Đỏ',   val: p.rc,        hi: p.rc > 0 },
    { lbl: 'Phản Lưới',val: p.og,        hi: false },
    { lbl: 'Trận Trễ', val: p.treTran,   hi: false },
    { lbl: 'Bom Hàng', val: p.bm,        hi: false },
    { lbl: 'Bàn Thua', val: p.ag,        hi: false },
    { lbl: 'Pen Thua', val: p.ap,        hi: false },
  ];
  document.getElementById('modal-grid').innerHTML = stats.map(s =>
    `<div class="stat-cell">
      <div class="stat-val${s.hi?' highlight':''}">${s.val ?? '-'}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`
  ).join('');

  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; }
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── Make player card (field) ──
function makePlayer(p, isStarter) {
  const div = document.createElement('div');
  div.className = `player ${cls(p.viTri)}`;
  const avatarHTML = p.avatar ? `<img src="${p.avatar}" alt="${p.ten}" onerror="this.classList.add('err')">` : '';
  div.innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar">${avatarHTML}<span class="ini">${ini(p.ten)}</span></div>
      <span class="score-badge">${p.diem}đ</span>
    </div>
    <div class="pname">${p.ten}</div>
    <div class="ppos">${lbl(p.viTri)}</div>`;
  div.addEventListener('mouseenter', e => showTip(e, p));
  div.addEventListener('mousemove',  e => moveTip(e));
  div.addEventListener('mouseleave', hideTip);
  div.addEventListener('click', () => {
    hideTip();
    if (selectedEl) selectedEl.classList.remove('selected');
    selectedEl = div;
    div.classList.add('selected');
    openModal(p, isStarter);
  });
  return div;
}

function makeRow(players, isStarter) {
  const row = document.createElement('div');
  row.className = 'row';
  players.filter(Boolean).forEach(p => row.appendChild(makePlayer(p, isStarter)));
  return row;
}

// ── Render field ──
function renderField(data) {
  const field = document.getElementById('field');
  field.innerHTML = '<div class="field-lines"></div>';
  const s = data.squad;

  field.appendChild(Object.assign(document.createElement('div'), {className:'goal-top'}));

  // 4-5-1: Tiền đạo (1)
  if (s["Tiền đạo"]?.length)         field.appendChild(makeRow(s["Tiền đạo"], true));

  // Tiền vệ (5): cánh T | TT x3 | cánh P
  const midRow = [
    s["Tiền vệ cánh"]?.[0],
    ...(s["Tiền vệ TT"]?.slice(0,3) || []),
    s["Tiền vệ cánh"]?.[1]
  ].filter(Boolean);
  if (midRow.length)                  field.appendChild(makeRow(midRow, true));

  // Hậu vệ (4): HV cánh T | Trung vệ x2 | HV cánh P
  const defRow = [
    s["Hậu vệ cánh"]?.[0],
    ...(s["Trung vệ"] || []),
    s["Hậu vệ cánh"]?.[1]
  ].filter(Boolean);
  if (defRow.length)                  field.appendChild(makeRow(defRow, true));

  // Thủ môn (1)
  if (s["Thủ môn"]?.length)          field.appendChild(makeRow(s["Thủ môn"], true));

  field.appendChild(Object.assign(document.createElement('div'), {className:'goal-bot'}));

  document.getElementById('meta').textContent = `Sơ đồ ${data.formation} · Cập nhật: ${data.updatedAt}`;
}

// ── Render bench ──
function renderBench(data) {
  const b = data.bench;
  if (!b) return;
  const ORDER = ["Thủ môn","Hậu vệ cánh","Trung vệ","Tiền vệ TT","Tiền vệ cánh","Tiền đạo"];
  const list = document.getElementById('bench-list');
  list.innerHTML = '';
  let first = true;
  ORDER.forEach(pos => {
    const players = b[pos];
    if (!players?.length) return;
    if (!first) { const sep=document.createElement('div'); sep.className='bench-sep'; list.appendChild(sep); }
    first = false;
    players.forEach(p => {
      const pc = cls(p.viTri);
      const div = document.createElement('div');
      div.className = `bench-player bench-${pc}`;
      const avatarHTML = p.avatar ? `<img src="${p.avatar}" alt="${p.ten}" onerror="this.classList.add('err')">` : '';
      div.innerHTML = `
        <div class="bench-avatar">${avatarHTML}<span class="ini">${ini(p.ten)}</span></div>
        <div class="bench-info">
          <div class="bench-name">${p.ten}</div>
          <div class="bench-sub">
            <span class="bench-pos">${lbl(p.viTri)}</span>
            <span class="bench-score">${p.diem}đ</span>
          </div>
        </div>`;
      div.addEventListener('mouseenter', e => showTip(e, p));
      div.addEventListener('mousemove',  e => moveTip(e));
      div.addEventListener('mouseleave', hideTip);
      div.addEventListener('click', () => {
        hideTip();
        if (selectedEl) selectedEl.classList.remove('selected');
        selectedEl = div;
        div.classList.add('selected');
        openModal(p, false);
      });
      list.appendChild(div);
    });
  });
  document.getElementById('bench-panel').style.display = 'block';
}

// ── Align bench top with field top ──
function alignBench() {
  const field = document.getElementById('field');
  const bench = document.getElementById('bench-panel');
  const wrap  = document.querySelector('.page-wrap');
  if (!field || !bench || !wrap) return;
  const offset = field.getBoundingClientRect().top - wrap.getBoundingClientRect().top;
  bench.style.marginTop = Math.max(0, offset) + 'px';
}
window.addEventListener('resize', alignBench);

// ── Fetch ──
fetch(API_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data => {
    renderField(data);
    renderBench(data);
    document.fonts.ready.then(() => { alignBench(); setTimeout(alignBench, 200); });
  })
  .catch(err => {
    document.getElementById('field').innerHTML = `
      <div class="state-msg">
        <span style="font-size:24px">⚠️</span>
        <span>Không tải được dữ liệu</span>
        <span style="font-size:10px;opacity:0.5">${err.message}</span>
      </div>`;
    document.getElementById('meta').textContent = 'Lỗi kết nối';
  });
</script>
</body>
