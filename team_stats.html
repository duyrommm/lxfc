<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LXFC Stats 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a2a0a;
  font-family: 'Be Vietnam Pro', sans-serif;
  color: #fff;
  padding: 16px;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 28px; font-weight: 700;
  color: #FFD700; letter-spacing: 3px;
}
.header .season {
  color: rgba(255,255,255,0.45);
  font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; margin-top: 4px;
}

/* ── Grid layout ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  max-width: 1100px;
  margin: 0 auto;
}
.grid-2 { grid-column: span 2; }
.grid-3 { grid-column: span 3; }

/* ── Nav ── */
.nav {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  width: 100%;
}
.nav-btn {
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 6px 16px; border-radius: 20px; cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: transparent; color: rgba(255,255,255,0.5);
  text-decoration: none; transition: all 0.15s;
  letter-spacing: 0.3px;
  white-space: nowrap;
  display: inline-block;
}
.nav-btn:hover { border-color: rgba(255,215,0,0.5); color: rgba(255,255,255,0.85); }
.nav-btn.active {
  background: rgba(255,215,0,0.15);
  border-color: #FFD700; color: #FFD700;
}

/* ── Card ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  max-width: 1100px;
  margin: 0 auto;
}
.grid-2 { grid-column: span 2; }
.grid-3 { grid-column: span 3; }
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.card-title {
  font-family: 'Oswald', sans-serif;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── Loading ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 100px; color: rgba(255,255,255,0.3); font-size: 13px; gap: 8px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: #FFD700; border-radius: 50%;
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Overview stats ── */
.overview-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 10px;
}
.ov-block { text-align: center; }
.ov-val {
  font-family: 'Oswald', sans-serif;
  font-size: 36px; font-weight: 700; line-height: 1;
}
.ov-label {
  color: rgba(255,255,255,0.4);
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.5px; margin-top: 4px;
}

/* ── WDL bar ── */
.wdl-wrap { margin-top: 14px; }
.wdl-bar {
  display: flex; height: 10px; border-radius: 5px; overflow: hidden; gap: 2px;
}
.wdl-w { background: #4caf50; border-radius: 5px 0 0 5px; }
.wdl-d { background: #ff9800; }
.wdl-l { background: #f44336; border-radius: 0 5px 5px 0; }
.wdl-labels {
  display: flex; justify-content: space-between;
  margin-top: 6px; font-size: 10px;
}
.wdl-labels span { display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.6); }
.dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── Goals stats ── */
.goals-row {
  display: flex; align-items: center; justify-content: center;
  gap: 24px; padding: 8px 0;
}
.goals-block { text-align: center; }
.goals-val {
  font-family: 'Oswald', sans-serif;
  font-size: 42px; font-weight: 700; line-height: 1;
}
.goals-val.green { color: #4caf50; }
.goals-val.red   { color: #f44336; }
.goals-label { color: rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; margin-top: 3px; }
.goals-sep {
  font-family: 'Oswald', sans-serif;
  font-size: 28px; color: rgba(255,255,255,0.2);
}
.goals-avg { text-align: center; margin-top: 10px; color: rgba(255,255,255,0.4); font-size: 11px; }

/* ── Top list ── */
.top-list { display: flex; flex-direction: column; gap: 8px; }
.top-item {
  display: flex; align-items: center; gap: 10px;
}
.top-rank {
  font-family: 'Oswald', sans-serif;
  font-size: 13px; color: rgba(255,255,255,0.25);
  width: 18px; text-align: center; flex-shrink: 0;
}
.top-rank.gold   { color: #FFD700; }
.top-rank.silver { color: #bdbdbd; }
.top-rank.bronze { color: #cd7f32; }
.top-bar-wrap { flex: 1; }
.top-name { font-size: 11px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top-bar-track { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.top-bar-fill  { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.top-val {
  font-family: 'Oswald', sans-serif;
  font-size: 16px; font-weight: 700;
  min-width: 28px; text-align: right;
}

/* ── Form strip ── */
.form-wrap { display: flex; flex-direction: column; gap: 10px; }
.form-row  { display: flex; align-items: center; gap: 8px; }
.form-opponent { font-size: 11px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.form-score { font-size: 11px; color: rgba(255,255,255,0.5); width: 44px; text-align: center; flex-shrink: 0; }
.form-date  { font-size: 10px; color: rgba(255,255,255,0.3); width: 50px; text-align: right; flex-shrink: 0; }
.result-badge {
  width: 22px; height: 22px; border-radius: 4px;
  font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.result-badge.W { background: #4caf50; }
.result-badge.D { background: #ff9800; }
.result-badge.L { background: #f44336; }

/* ── Head to head ── */
.h2h-list { display: flex; flex-direction: column; gap: 8px; }
.h2h-item { display: flex; align-items: center; gap: 8px; }
.h2h-name { font-size: 11px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h2h-badges { display: flex; gap: 3px; }
.h2h-badge {
  font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 4px;
  font-family: 'Oswald', sans-serif;
}
.h2h-badge.w { background: rgba(76,175,80,0.2); color: #4caf50; }
.h2h-badge.d { background: rgba(255,152,0,0.2); color: #ff9800; }
.h2h-badge.l { background: rgba(244,67,54,0.2); color: #f44336; }
.h2h-stat { font-size: 10px; color: rgba(255,255,255,0.35); flex-shrink: 0; }

/* ── Finance ── */
.finance-big {
  text-align: center; padding: 4px 0 12px;
}
.finance-big .val {
  font-family: 'Oswald', sans-serif;
  font-size: 32px; font-weight: 700; color: #4caf50;
}
.finance-big .label {
  color: rgba(255,255,255,0.4); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;
}
.finance-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 12px;
}
.finance-row .flabel { color: rgba(255,255,255,0.5); }
.finance-row .fval   { font-weight: 700; }
.finance-row .fval.thu { color: #4caf50; }
.finance-row .fval.chi { color: #f44336; }

/* ── Discipline ── */
.disc-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.disc-item {
  background: rgba(255,255,255,0.03);
  border-radius: 8px; padding: 10px;
  display: flex; align-items: center; gap: 10px;
}
.disc-icon { font-size: 20px; flex-shrink: 0; }
.disc-val {
  font-family: 'Oswald', sans-serif;
  font-size: 22px; font-weight: 700;
}
.disc-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; }

/* ════════════════════════════════
   RESPONSIVE MOBILE
   ════════════════════════════════ */
@media (max-width: 600px) {
  body { padding: 10px 8px; }

  .header h1 { font-size: 22px; }

  /* 3 cột → 1 cột */
  .grid {
    grid-template-columns: 1fr !important;
    gap: 10px;
  }
  .grid-2, .grid-3 { grid-column: span 1 !important; }

  /* Overview 4 ô → 2x2 */
  .overview-grid { grid-template-columns: repeat(2, 1fr); }
  .ov-val { font-size: 28px; }

  /* Bàn thắng/thua nhỏ hơn */
  .goals-val { font-size: 32px; }

  /* Kỷ luật 2 cột giữ nguyên, font nhỏ hơn */
  .disc-val { font-size: 18px; }

  /* Top list compact */
  .top-val { font-size: 14px; }
}

/* Updated at */
.updated {
  text-align: center; margin-top: 16px;
  color: rgba(255,255,255,0.2); font-size: 10px;
}
</style>
</head>
<body>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzYwh_8bcxS-73I12Ou7HZelacLbX-rXBO87BhGQaiWnRY68STcfO1RSB6N7kEJrRfT/exec?page=stats";
</script>

<nav class="nav">
  <a class="nav-btn" href="https://duyrommm.github.io/lxfc/dynamic.html">⚽ Đội Hình</a>
  <a class="nav-btn active" href="#">📊 Thống Kê Đội</a>
</nav>

<div class="header">
  <h1>⚽ LXFC STATS 2026</h1>
  <div class="season" id="updated">Đang tải...</div>
</div>

<div class="grid" id="dashboard">
  <div class="card" style="grid-column:span 3">
    <div class="loading"><div class="spinner"></div> Đang tải dữ liệu...</div>
  </div>
</div>

<script>
function fmt(n) {
  return Number(n).toLocaleString('vi-VN');
}
function rankCls(i) {
  return i===0?'gold':i===1?'silver':i===2?'bronze':'';
}

function renderDashboard(d) {
  const m = d.matches;
  const total = m.w + m.d + m.l;
  const winPct = total > 0 ? Math.round(m.w/total*100) : 0;
  const wPct = total > 0 ? (m.w/total*100).toFixed(1) : 0;
  const dPct = total > 0 ? (m.d/total*100).toFixed(1) : 0;
  const lPct = total > 0 ? (m.l/total*100).toFixed(1) : 0;

  document.getElementById('dashboard').innerHTML = `

    <!-- ── Tổng quan ── -->
    <div class="card grid-2">
      <div class="card-title">📊 Tổng quan mùa giải</div>
      <div class="overview-grid">
        <div class="ov-block">
          <div class="ov-val" style="color:#FFD700">${total}</div>
          <div class="ov-label">Số trận</div>
        </div>
        <div class="ov-block">
          <div class="ov-val" style="color:#4caf50">${m.w}</div>
          <div class="ov-label">Thắng</div>
        </div>
        <div class="ov-block">
          <div class="ov-val" style="color:#ff9800">${m.d}</div>
          <div class="ov-label">Hòa</div>
        </div>
        <div class="ov-block">
          <div class="ov-val" style="color:#f44336">${m.l}</div>
          <div class="ov-label">Thua</div>
        </div>
      </div>
      <div class="wdl-wrap">
        <div class="wdl-bar">
          <div class="wdl-w" style="flex:${m.w}"></div>
          <div class="wdl-d" style="flex:${m.d}"></div>
          <div class="wdl-l" style="flex:${m.l}"></div>
        </div>
        <div class="wdl-labels">
          <span><span class="dot" style="background:#4caf50"></span>Thắng ${wPct}%</span>
          <span><span class="dot" style="background:#ff9800"></span>Hòa ${dPct}%</span>
          <span><span class="dot" style="background:#f44336"></span>Thua ${lPct}%</span>
        </div>
      </div>
    </div>

    <!-- ── Bàn thắng/thua ── -->
    <div class="card">
      <div class="card-title">⚽ Bàn thắng / Thua</div>
      <div class="goals-row">
        <div class="goals-block">
          <div class="goals-val green">${m.gf}</div>
          <div class="goals-label">Bàn thắng</div>
        </div>
        <div class="goals-sep">:</div>
        <div class="goals-block">
          <div class="goals-val red">${m.ga}</div>
          <div class="goals-label">Bàn thua</div>
        </div>
      </div>
      <div class="goals-avg">
        TB ${(m.gf/total).toFixed(1)} bàn thắng · ${(m.ga/total).toFixed(1)} bàn thua / trận
      </div>
    </div>

    <!-- ── Top ghi bàn ── -->
    <div class="card">
      <div class="card-title">🥅 Top ghi bàn</div>
      <div class="top-list">
        ${d.topGF.map((p,i) => `
        <div class="top-item">
          <div class="top-rank ${rankCls(i)}">${i+1}</div>
          <div class="top-bar-wrap">
            <div class="top-name">${p.name}${p.gp>0?` <span style="color:#ff9800;font-size:9px;font-weight:400">(${p.gp} pen)</span>`:''}</div>
            <div class="top-bar-track">
              <div class="top-bar-fill" style="width:${Math.round(p.val/d.topGF[0].val*100)}%;background:#4caf50"></div>
            </div>
          </div>
          <div class="top-val" style="color:#4caf50">${p.val}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- ── Top kiến tạo ── -->
    <div class="card">
      <div class="card-title">🎯 Top kiến tạo</div>
      <div class="top-list">
        ${d.topAST.map((p,i) => `
        <div class="top-item">
          <div class="top-rank ${rankCls(i)}">${i+1}</div>
          <div class="top-bar-wrap">
            <div class="top-name">${p.name}</div>
            <div class="top-bar-track">
              <div class="top-bar-fill" style="width:${Math.round(p.val/d.topAST[0].val*100)}%;background:#2196f3"></div>
            </div>
          </div>
          <div class="top-val" style="color:#2196f3">${p.val}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- ── Top chuyên cần ── -->
    <div class="card">
      <div class="card-title">💪 Top chuyên cần</div>
      <div class="top-list">
        ${d.topCC.map((p,i) => `
        <div class="top-item">
          <div class="top-rank ${rankCls(i)}">${i+1}</div>
          <div class="top-bar-wrap">
            <div class="top-name">${p.name}</div>
            <div class="top-bar-track">
              <div class="top-bar-fill" style="width:${Math.round(p.val/d.topCC[0].val*100)}%;background:#FFD700"></div>
            </div>
          </div>
          <div class="top-val" style="color:#FFD700">${p.val} trận</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- ── Form gần đây ── -->
    <div class="card">
      <div class="card-title">📅 Các trận gần nhất</div>
      <div style="display:flex;gap:5px;margin-bottom:12px">
        ${d.recentForm.map(r=>`<div class="result-badge ${r}">${r}</div>`).join('')}
      </div>
      <div class="form-wrap">
        ${d.recentMatches.map(m=>{
          const res = m.our>m.their?'W':m.our===m.their?'D':'L';
          return `<div class="form-row" style="flex-wrap:wrap;gap:4px">
            <div class="result-badge ${res}">${res}</div>
            <div class="form-opponent">${m.opponent}</div>
            <div class="form-score">${m.our} - ${m.their}</div>
            <div class="form-date">${m.date}</div>
            ${m.stadium?`<div style="width:100%;padding-left:30px;font-size:9px;color:rgba(255,255,255,0.3)">📍 ${m.stadium}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- ── Lịch sử đối đầu ── -->
    <div class="card">
      <div class="card-title">🆚 Lịch sử đối đầu</div>
      <div class="h2h-list">
        ${d.h2h.map(o=>`
        <div class="h2h-item">
          <div class="h2h-name">${o.name}</div>
          <div class="h2h-badges">
            ${o.w>0?`<span class="h2h-badge w">${o.w}W</span>`:''}
            ${o.d>0?`<span class="h2h-badge d">${o.d}D</span>`:''}
            ${o.l>0?`<span class="h2h-badge l">${o.l}L</span>`:''}
          </div>
          <div class="h2h-stat">${o.gf}:${o.ga}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- ── Kỷ luật + Top bom hàng ── -->
    <div class="card">
      <div class="card-title">🚨 Kỷ luật</div>
      <div class="disc-grid">
        <div class="disc-item">
          <div class="disc-icon">🟨</div>
          <div>
            <div class="disc-val" style="color:#FFD700">${d.discipline.yc}</div>
            <div class="disc-label">Thẻ vàng</div>
          </div>
        </div>
        <div class="disc-item">
          <div class="disc-icon">🟥</div>
          <div>
            <div class="disc-val" style="color:#f44336">${d.discipline.rc}</div>
            <div class="disc-label">Thẻ đỏ</div>
          </div>
        </div>
        <div class="disc-item">
          <div class="disc-icon">💣</div>
          <div>
            <div class="disc-val" style="color:#ff9800">${d.discipline.bm}</div>
            <div class="disc-label">Bom hàng</div>
          </div>
        </div>
        <div class="disc-item">
          <div class="disc-icon">⏰</div>
          <div>
            <div class="disc-val" style="color:#90caf9">${d.discipline.tr}</div>
            <div class="disc-label">Trận trễ</div>
          </div>
        </div>
      </div>
      <div style="margin-top:14px;border-top:1px solid rgba(255,255,255,0.06);padding-top:12px">
        <div class="card-title" style="margin-bottom:10px">💣 Top bom hàng</div>
        <div class="top-list">
          ${d.topBM.filter(p=>p.val>0).map((p,i)=>`
          <div class="top-item">
            <div class="top-rank ${rankCls(i)}">${i+1}</div>
            <div class="top-bar-wrap">
              <div class="top-name">${p.name}</div>
              <div class="top-bar-track">
                <div class="top-bar-fill" style="width:${Math.round(p.val/d.topBM[0].val*100)}%;background:#ff9800"></div>
              </div>
            </div>
            <div class="top-val" style="color:#ff9800">${p.val}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>


    <!-- ── Lucky charm: Tỉ lệ thắng ── -->
    <div class="card">
      <div class="card-title">🍀 Linh Vật — tỉ lệ thắng</div>
      <div class="top-list" id="lucky-list"></div>
    </div>

    <!-- ── Chuỗi trận hiện tại ── -->
    <div class="card">
      <div class="card-title">🔥 Chuỗi trận hiện tại</div>
      <div id="streak-card"></div>
    </div>

    <!-- ── Sparkline điểm tích lũy ── -->
    <div class="card">
      <div class="card-title">📈 Điểm tích lũy mùa giải</div>
      <div id="sparkline-card"></div>
    </div>

    <!-- ── Tường thành: cleanRate ── -->
    <div class="card">
      <div class="card-title">🧤 Tường thành — giữ sạch lưới</div>
      <div class="top-list" id="clean-list"></div>
    </div>

    <!-- ── Đóng góp bàn thắng ── -->
    <div class="card">
      <div class="card-title">⚡ Đóng góp bàn thắng</div>
      <div class="top-list" id="contrib-list"></div>
    </div>

    <!-- ── Vắng mặt đáng lo ngại ── -->
    <div class="card">
      <div class="card-title">⚠️ Vắng mặt đáng lo ngại</div>
      <div class="absence-list" id="absence-list"></div>
    </div>

  `;

  // ── Render Lucky Charm ──
  renderTopList('lucky-list', d.topWinRate || [], (p, i) => {
    const maxRate = (d.topWinRate[0] || {}).winRate || 1;
    const barClr  = i===0 ? '#FFD700' : i===1 ? 'rgba(255,255,255,0.55)' : 'rgba(205,127,50,0.85)';
    const cols    = ['#FFD700','#bdbdbd','#cd7f32'];
    const tieNote = i > 0 && p.winRate === d.topWinRate[i-1].winRate ? ' · TB' : '';
    const el = document.createElement('div');
    el.className = 'top-item';
    el.innerHTML =
      '<div class="top-rank ' + rankCls(i) + '">' + (i+1) + '</div>' +
      '<div class="top-bar-wrap">' +
        '<div class="top-name">' + p.name + '<span class="winrate-sub">(' + p.wins + 'W/' + p.tran + ' trận' + tieNote + ')</span></div>' +
        '<div class="top-bar-track"><div class="top-bar-fill" style="width:' + Math.round(p.winRate/maxRate*100) + '%;background:' + barClr + '"></div></div>' +
      '</div>' +
      '<div class="top-val" style="color:' + (i<3?cols[i]:'rgba(255,255,255,0.6)') + '">' + p.winRate + '<span style="font-size:11px;font-weight:400">%</span></div>';
    return el;
  }, 'Chưa đủ dữ liệu (cần ≥5 trận)');

  // ── Render Streak ──
  (function() {
    const el = document.getElementById('streak-card');
    if (!el) return;
    const s = d.currentStreak || { type: '', count: 0 };
    if (!s.count) { el.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:11px">Chưa có dữ liệu</div>'; return; }
    const colorMap = { W: '#4caf50', D: '#ff9800', L: '#f44336' };
    const textMap  = { W: 'thắng liên tiếp 🔥', D: 'hòa liên tiếp', L: 'thua liên tiếp' };
    let badges = '';
    (d.recentForm || []).slice(0,7).forEach(function(r) {
      badges += '<div class="result-badge ' + r + '">' + r + '</div>';
    });
    el.innerHTML =
      '<div class="streak-badges">' + badges + '</div>' +
      '<div class="streak-big" style="color:' + (colorMap[s.type]||'#fff') + '">' + s.count + ' trận ' + (textMap[s.type]||'') + '</div>' +
      '<div class="streak-label">Dựa trên ' + (d.recentForm||[]).length + ' trận gần nhất</div>';
  })();

  // ── Render Sparkline ──
  (function() {
    const el = document.getElementById('sparkline-card');
    if (!el) return;
    var tl = d.pointsTimeline || [];
    if (tl.length < 2) { el.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:11px;padding:16px 0">Chưa đủ dữ liệu</div>'; return; }
    var pts = tl.map(function(t){ return t.pts; });
    var maxPts = Math.max.apply(null, pts) || 1;
    var W = 260, H = 56;
    var pointsStr = tl.map(function(t, i) {
      var x = Math.round(i / (tl.length - 1) * W);
      var y = Math.round(H - (t.pts / maxPts) * H);
      return x + ',' + y;
    }).join(' ');
    var lastPts = pts[pts.length - 1];
    var months = {};
    tl.forEach(function(t, i) { var m = t.date.slice(3); if (!months[m]) months[m] = i; });
    var mlabels = Object.keys(months).map(function(m) {
      var x = Math.round(months[m] / (tl.length - 1) * W);
      return '<text x="' + x + '" y="72" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="middle">T' + m.split('/')[0] + '</text>';
    }).join('');
    el.innerHTML =
      '<div class="spark-wrap">' +
        '<svg viewBox="0 0 ' + W + ' 75" preserveAspectRatio="none">' +
          '<defs><linearGradient id="spg" x1="0" y1="0" x2="0" y2="1">' +
            '<stop offset="0%" stop-color="#4caf50" stop-opacity="0.3"/>' +
            '<stop offset="100%" stop-color="#4caf50" stop-opacity="0"/>' +
          '</linearGradient></defs>' +
          '<polygon points="' + pointsStr + ' ' + W + ',' + H + ' 0,' + H + '" fill="url(#spg)"/>' +
          '<polyline points="' + pointsStr + '" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>' +
          mlabels +
        '</svg>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">' +
        '<span style="font-size:10px;color:rgba(255,255,255,0.4)">' + tl[0].date + ' → ' + tl[tl.length-1].date + '</span>' +
        '<span style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;color:#4caf50">' + lastPts + ' pts</span>' +
      '</div>';
  })();

  // ── Render Clean Rate ──
  renderTopList('clean-list', d.topCleanRate || [], function(p, i) {
    var maxRate = ((d.topCleanRate||[])[0] || {}).cleanRate || 1;
    var el = document.createElement('div');
    el.className = 'top-item';
    el.innerHTML =
      '<div class="top-rank ' + rankCls(i) + '">' + (i+1) + '</div>' +
      '<div class="top-bar-wrap">' +
        '<div class="top-name">' + p.name + '<span class="winrate-sub">(' + p.tran + ' trận)</span></div>' +
        '<div class="top-bar-track"><div class="top-bar-fill" style="width:' + Math.round(p.cleanRate/maxRate*100) + '%;background:#00acc1"></div></div>' +
      '</div>' +
      '<div class="top-val" style="color:#00acc1">' + p.cleanRate + '<span style="font-size:11px;font-weight:400">%</span></div>';
    return el;
  }, 'Chưa đủ dữ liệu');

  // ── Render Contrib Rate ──
  renderTopList('contrib-list', d.topContribRate || [], function(p, i) {
    var maxRate = ((d.topContribRate||[])[0] || {}).contribRate || 1;
    var el = document.createElement('div');
    el.className = 'top-item';
    el.innerHTML =
      '<div class="top-rank ' + rankCls(i) + '">' + (i+1) + '</div>' +
      '<div class="top-bar-wrap">' +
        '<div class="top-name">' + p.name + '<span class="winrate-sub">(' + p.gf + ' bàn+kiến tạo)</span></div>' +
        '<div class="top-bar-track"><div class="top-bar-fill" style="width:' + Math.round(p.contribRate/maxRate*100) + '%;background:#ab47bc"></div></div>' +
      '</div>' +
      '<div class="top-val" style="color:#ab47bc">' + p.contribRate + '<span style="font-size:11px;font-weight:400">%</span></div>';
    return el;
  }, 'Chưa đủ dữ liệu');

  // ── Render Absence Warnings ──
  (function() {
    var el = document.getElementById('absence-list');
    if (!el) return;
    var list = d.absenceWarnings || [];
    if (!list.length) {
      el.outerHTML = '<div style="text-align:center;padding:20px;color:#4caf50;font-size:12px">✅ Tất cả đang duy trì chuyên cần tốt!</div>';
      return;
    }
    list.forEach(function(p) {
      var cls    = p.missedCount >= 4 ? 'danger' : p.missedCount >= 3 ? 'warn' : 'watch';
      var dotClr = p.missedCount >= 4 ? '#f44336' : p.missedCount >= 3 ? '#ff9800' : 'rgba(255,255,255,0.35)';
      var lbl    = p.missedCount >= 4 ? 'Báo động' : p.missedCount >= 3 ? 'Cảnh báo' : 'Theo dõi';
      var row    = document.createElement('div');
      row.className = 'absence-row';
      row.innerHTML =
        '<div class="absence-dot" style="background:' + dotClr + '"></div>' +
        '<div class="absence-name">' + p.name + '</div>' +
        '<div class="absence-days">vắng ' + p.missedCount + ' trận · ' + p.missedDays + 'ng</div>' +
        '<div class="absence-badge ' + cls + '">' + lbl + '</div>';
      el.appendChild(row);
    });
  })();

  document.getElementById('updated').textContent = `Mùa giải 2026 · Cập nhật: ${d.updatedAt}`;
}

// ── Helper: render top list với DOM (tránh template literal lồng nhau) ──
function renderTopList(elId, arr, buildFn, emptyMsg) {
  var el = document.getElementById(elId);
  if (!el) return;
  if (!arr.length) {
    el.innerHTML = '<div style="text-align:center;padding:16px;color:rgba(255,255,255,0.3);font-size:11px">' + emptyMsg + '</div>';
    return;
  }
  arr.forEach(function(p, i) { el.appendChild(buildFn(p, i)); });
}

// ── Fetch ──
fetch(API_URL)
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data => {
    if (!data || !data.matches) {
      throw new Error('Dữ liệu không hợp lệ — kiểm tra lại doGet routing (?page=stats)');
    }
    renderDashboard(data);
  })
  .catch(err => {
    document.getElementById('dashboard').innerHTML = `
      <div class="card" style="grid-column:span 3;text-align:center;padding:40px">
        <div style="font-size:32px;margin-bottom:8px">⚠️</div>
        <div>Không tải được dữ liệu</div>
        <div style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:4px">${err.message}</div>
      </div>`;
  });
</script>
</body>
</html>
